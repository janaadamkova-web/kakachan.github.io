<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janis | Profil</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #d35400; margin-top: 0; }
        .interests { font-style: italic; color: #555; }
        
        /* Styl tlačítka vytažený do CSS pro čistotu */
        .btn-svickova {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 25px;
            background-color: #d9534f;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-svickova:hover {
            background-color: #c9302c;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ahoj, já jsem Janis</h1>
        <p>Mám ráda <strong>svíčkovou a svíčky</strong>. Doma mi dělá společnost kočka a ze všeho nejraději spím.</p>
        
        <p class="interests">Fotím, točím, píšu a žiju type shit.</p>
        
        <p>Sportuju, lezu a taekwonduju. Mám pár kamarádů a mám je celkem ráda.</p>

        <a href="svickova.html" class="btn-svickova">🥩 Přečíst si o svíčkové</a>
    </div>

</body>
</html>
